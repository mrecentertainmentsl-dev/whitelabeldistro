events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Logging
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" '
                  'host=$host';
  access_log /var/log/nginx/access.log main;
  error_log /var/log/nginx/error.log warn;

  # Basic settings
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  client_max_body_size 600M;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml;

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
  limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/m;

  # Upstream
  upstream frontend { server frontend:3000; }
  upstream backend  { server backend:3001; }

  # ─── White-label wildcard handler ──────────────────────────────────
  # This catches ANY domain pointed at this server via CNAME
  server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Pass domain header to backend for tenant resolution
    proxy_set_header X-Domain $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host $host;

    # API routes → backend
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://backend;
      proxy_read_timeout 300s;
    }

    # Upload routes — larger timeout + body
    location /api/v1/uploads {
      limit_req zone=upload burst=10 nodelay;
      client_max_body_size 600M;
      proxy_pass http://backend;
      proxy_read_timeout 600s;
      proxy_send_timeout 600s;
    }

    # Frontend → Next.js
    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_cache_bypass $http_upgrade;
    }

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
  }

  # ─── HTTPS (SSL termination) ────────────────────────────────────────
  # Uncomment when SSL certs are available
  # server {
  #   listen 443 ssl http2;
  #   server_name _;
  #   ssl_certificate /etc/nginx/ssl/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/ssl/privkey.pem;
  #   ssl_protocols TLSv1.2 TLSv1.3;
  #   ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
  #   ... (same location blocks as above)
  # }
}
